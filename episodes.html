<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/url_fixing_worker.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Episodes — Kids Learning Lab™</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="wp-content/uploads/2025/02/podcast-logo-app-rounded.png">
  <meta name="description" content="Browse all episodes of Kids Learning Lab — a kids podcast made by a 12 year old!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #f5f2ed;
      --bg2:       #edeae3;
      --card:      #ffffff;
      --border:    #ddd9d0;
      --text:      #1a1612;
      --muted:     #6b6459;
      --accent:    #1a6fc4;
      --accent2:   #e8f0fb;
      --active-bg: #1a6fc4;
      --active-fg: #ffffff;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Albert Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Page layout ── */
    .ep-page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    /* ── Header row: logo + title ── */
    .ep-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 2.2rem;
    }

    .ep-header img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      box-shadow: 0 4px 16px rgba(26,111,196,0.18);
      flex-shrink: 0;
    }

    .ep-header-text h1 {
      font-family: 'Funnel Display', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .ep-header-text p {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Episode list panel ── */
    .ep-list-panel {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .ep-list-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .ep-list-header h2 {
      font-family: 'Funnel Display', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ep-search {
      width: 100%;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      font-family: 'Albert Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .ep-search:focus { border-color: var(--accent); }

    .ep-list-scroll {
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .ep-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .ep-item:last-child { border-bottom: none; }
    .ep-item:hover { background: var(--bg2); }

    .ep-item-art {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg2);
    }

    .ep-item-info { flex: 1; min-width: 0; }

    .ep-item-title {
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ep-item-date {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .ep-item-dur {
      font-size: 0.75rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .ep-item-arrow {
      font-size: 0.9rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: 4px;
    }

    .ep-load-more {
      width: 100%;
      padding: 13px;
      border: none;
      background: var(--bg2);
      color: var(--accent);
      font-family: 'Albert Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }
    .ep-load-more:hover { background: var(--border); }

    /* Empty / loading states */
    .ep-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 30px;
      text-align: center;
      color: var(--muted);
      gap: 12px;
    }
    .ep-placeholder svg { width: 48px; height: 48px; fill: var(--border); }
    .ep-placeholder p { font-size: 0.95rem; }

    .ep-spinner {
      width: 22px; height: 22px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════
       MODAL OVERLAY
    ════════════════════════════════════ */
    .ep-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .ep-modal-overlay.open { display: flex; }

    .ep-modal {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
      animation: modalIn 0.22s ease;
      position: relative;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .ep-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.22);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      line-height: 1;
      transition: background 0.15s;
    }
    .ep-modal-close:hover { background: rgba(0,0,0,0.4); }

    /* Art banner */
    .ep-modal-art {
      width: 100%;
      aspect-ratio: 16/7;
      object-fit: cover;
      background: var(--bg2);
      display: block;
    }

    .ep-modal-body {
      padding: 20px 22px 24px;
    }

    .ep-modal-label {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .ep-modal-title {
      font-family: 'Funnel Display', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 4px;
    }

    .ep-modal-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .ep-modal-desc {
      font-size: 0.87rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 18px;
      max-height: 68px;
      overflow: hidden;
      mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
    }

    /* Progress */
    .ep-progress-wrap {
      margin-bottom: 6px;
      position: relative;
    }

    .ep-progress-bg {
      width: 100%;
      height: 5px;
      background: var(--bg2);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .ep-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #42a5f5);
      border-radius: 10px;
      transition: width 0.1s linear;
    }

    .ep-seek {
      position: absolute;
      top: 50%; left: 0;
      transform: translateY(-50%);
      width: 100%; height: 18px;
      opacity: 0;
      cursor: pointer;
      margin: 0;
    }

    .ep-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* Controls */
    .ep-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .ep-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      color: var(--text);
      flex-shrink: 0;
    }
    .ep-btn:hover { background: var(--border); transform: scale(1.05); }
    .ep-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .ep-btn.play-pause {
      width: 52px; height: 52px;
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 4px 14px rgba(26,111,196,0.3);
    }
    .ep-btn.play-pause svg { width: 22px; height: 22px; }
    .ep-btn.play-pause:hover { background: #1560ad; transform: scale(1.06); }

    .ep-vol-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-left: auto;
    }
    .ep-vol-wrap svg { width: 15px; height: 15px; fill: var(--muted); flex-shrink: 0; }

    .ep-vol {
      -webkit-appearance: none;
      appearance: none;
      width: 72px; height: 4px;
      border-radius: 10px;
      background: var(--border);
      outline: none; cursor: pointer;
    }
    .ep-vol::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* ── Share buttons ── */
    .ep-share-row {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ep-share-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 2px;
    }

    .ep-share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2);
      font-family: 'Albert Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .ep-share-btn:hover { background: var(--border); }

    .ep-share-btn.copy-btn.copied {
      background: #e6f7ee;
      border-color: #4caf7d;
      color: #2a7d50;
    }

    .ep-share-btn svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .ep-vol-wrap { display: none; }
      .ep-modal-title { font-size: 1.1rem; }
      .ep-share-btn span { display: none; }
    }
  </style>
</head>

<script>
(function () {
  const RSS_URL      = 'https://anchor.fm/s/d1b8e6fc/podcast/rss';
  const FALLBACK_ART = 'https://kidslearninglab.com/wp-content/uploads/2025/02/podcast-logo-app-rounded.png';
  const PER_PAGE     = 10;

  let allEpisodes  = [];
  let filtered     = [];
  let shownCount   = 0;
  let currentAudio = null;
  let currentIndex = -1;

  const listScroll  = document.getElementById('ep-list-scroll');
  const loadMoreBtn = document.getElementById('ep-load-more');
  const searchInput = document.getElementById('ep-search');
  const overlay     = document.getElementById('ep-modal-overlay');
  const modalInner  = document.getElementById('ep-modal-inner');
  const closeBtn    = document.getElementById('ep-modal-close');

  /* ── Helpers ── */
  function fmtTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function fmtDate(str) {
    if (!str) return '';
    const d = new Date(str);
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function stripHtml(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    return d.textContent || d.innerText || '';
  }

  function slugify(title) {
    return title
      .toLowerCase()
      .replace(/['']/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  /* ── Parse RSS ── */
  function parseRSS(text) {
    const blocks = [];
    const re = /<item>([\s\S]*?)<\/item>/g;
    let m;
    while ((m = re.exec(text)) !== null) blocks.push(m[1]);
    return blocks.map(block => {
      const get = (tag) => {
        const cdataM = block.match(new RegExp(`<${tag}[^>]*><!\\[CDATA\\[([\\s\\S]*?)\\]\\]><\\/${tag}>`));
        if (cdataM) return cdataM[1].trim();
        const plainM = block.match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`));
        return plainM ? plainM[1].trim() : '';
      };
      const encM = block.match(/<enclosure[^>]+url="([^"]+)"/);
      const artM = block.match(/<itunes:image[^>]+href="([^"]+)"/);
      const durM = block.match(/<itunes:duration[^>]*>([^<]+)<\/itunes:duration>/);
      return {
        title:    get('title'),
        pubDate:  get('pubDate'),
        desc:     stripHtml(get('description') || get('itunes:summary') || ''),
        audioUrl: encM ? encM[1] : null,
        art:      artM ? artM[1] : FALLBACK_ART,
        duration: durM ? durM[1].trim() : '',
      };
    }).filter(e => e.audioUrl);
  }

  /* ── Render list ── */
  function renderList() {
    listScroll.innerHTML = '';
    shownCount = 0;
    appendItems();
  }

  function appendItems() {
    const slice = filtered.slice(shownCount, shownCount + PER_PAGE);
    slice.forEach((ep, i) => {
      const idx = shownCount + i;
      const div = document.createElement('div');
      div.className = 'ep-item';
      div.dataset.idx = idx;
      div.innerHTML = `
        <img class="ep-item-art" src="${ep.art}" alt="" onerror="this.src='${FALLBACK_ART}'">
        <div class="ep-item-info">
          <div class="ep-item-title">${ep.title}</div>
          <div class="ep-item-date">${fmtDate(ep.pubDate)}${ep.duration ? ' · ' + ep.duration : ''}</div>
        </div>
        <div class="ep-item-arrow">▶</div>
      `;
      div.addEventListener('click', () => openModal(idx));
      listScroll.appendChild(div);
    });
    shownCount += slice.length;
    loadMoreBtn.style.display = shownCount < filtered.length ? 'block' : 'none';
  }

  /* ── Open modal ── */
  function openModal(idx) {
    currentIndex = idx;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    const ep = filtered[idx];
    history.replaceState(null, '', '?ep=' + slugify(ep.title));

    const shareUrl  = encodeURIComponent(window.location.href);
    const shareText = encodeURIComponent('🎧 Check out this episode: ' + ep.title);

    modalInner.innerHTML = `
      <img class="ep-modal-art" src="${ep.art}" alt="${ep.title}" onerror="this.src='${FALLBACK_ART}'">
      <div class="ep-modal-body">
        <div class="ep-modal-label">Now Playing</div>
        <div class="ep-modal-title" id="ep-modal-title-el">${ep.title}</div>
        <div class="ep-modal-meta">${fmtDate(ep.pubDate)}</div>
        <div class="ep-modal-desc">${ep.desc}</div>

        <div class="ep-progress-wrap">
          <div class="ep-progress-bg">
            <div class="ep-progress-fill" id="ep-fill"></div>
          </div>
          <input type="range" class="ep-seek" id="ep-seek" min="0" max="100" value="0" step="0.1">
        </div>
        <div class="ep-times">
          <span id="ep-cur">0:00</span>
          <span id="ep-dur">--:--</span>
        </div>

        <div class="ep-controls">
          <button class="ep-btn" id="ep-prev" title="Previous episode">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ep-btn" id="ep-back" title="−15s">
            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="7" y="15.5" font-size="5.5" font-family="Albert Sans,sans-serif" font-weight="800" fill="currentColor">15</text></svg>
          </button>
          <button class="ep-btn play-pause" id="ep-play" title="Play/Pause">
            <svg id="ep-play-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ep-btn" id="ep-fwd" title="+15s">
            <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="7" y="15.5" font-size="5.5" font-family="Albert Sans,sans-serif" font-weight="800" fill="currentColor">15</text></svg>
          </button>
          <button class="ep-btn" id="ep-next" title="Next episode">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 6-4.35V16.35L8.5 12zM16 6h2v12h-2z"/></svg>
          </button>
          <div class="ep-vol-wrap">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="ep-vol" id="ep-vol" min="0" max="1" step="0.02" value="1">
          </div>
        </div>

        <!-- Share row -->
        <div class="ep-share-row">
          <span class="ep-share-label">Share</span>

          <button class="ep-share-btn copy-btn" id="ep-copy-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            <span>Copy link</span>
          </button>

          <a class="ep-share-btn"
             href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}"
             target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <span>X / Twitter</span>
          </a>

          <a class="ep-share-btn"
             href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}"
             target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            <span>Facebook</span>
          </a>

          <a class="ep-share-btn"
             href="https://wa.me/?text=${shareText}%20${shareUrl}"
             target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
            <span>WhatsApp</span>
          </a>
        </div>
      </div>
    `;

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    /* audio setup */
    const audio    = new Audio(ep.audioUrl);
    currentAudio   = audio;
    audio.preload  = 'metadata';

    const fill     = document.getElementById('ep-fill');
    const seek     = document.getElementById('ep-seek');
    const curEl    = document.getElementById('ep-cur');
    const durEl    = document.getElementById('ep-dur');
    const playBtn  = document.getElementById('ep-play');
    const playIcon = document.getElementById('ep-play-icon');
    const vol      = document.getElementById('ep-vol');
    const copyBtn  = document.getElementById('ep-copy-btn');

    const PLAY  = 'M8 5v14l11-7z';
    const PAUSE = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

    function setIcon(playing) {
      playIcon.querySelector('path').setAttribute('d', playing ? PAUSE : PLAY);
    }

    audio.addEventListener('loadedmetadata', () => {
      durEl.textContent = fmtTime(audio.duration);
      seek.max = audio.duration;
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      fill.style.width = pct + '%';
      seek.value = audio.currentTime;
      curEl.textContent = fmtTime(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      setIcon(false);
      if (currentIndex + 1 < filtered.length) openModal(currentIndex + 1);
    });

    audio.play().then(() => setIcon(true)).catch(() => setIcon(false));

    playBtn.addEventListener('click', () => {
      if (audio.paused) { audio.play(); setIcon(true); }
      else              { audio.pause(); setIcon(false); }
    });

    seek.addEventListener('input', () => { audio.currentTime = seek.value; });
    document.getElementById('ep-back').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
    document.getElementById('ep-fwd').addEventListener('click',  () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15); });
    document.getElementById('ep-prev').addEventListener('click', () => { if (currentIndex > 0) openModal(currentIndex - 1); });
    document.getElementById('ep-next').addEventListener('click', () => { if (currentIndex + 1 < filtered.length) openModal(currentIndex + 1); });
    vol.addEventListener('input', () => { audio.volume = vol.value; });

    /* copy link */
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        copyBtn.classList.add('copied');
        copyBtn.querySelector('span').textContent = 'Copied!';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('span').textContent = 'Copy link';
        }, 2000);
      });
    });
  }

  /* ── Close modal ── */
  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }

  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ── Search ── */
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    filtered = q ? allEpisodes.filter(e => e.title.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q)) : allEpisodes;
    renderList();
  });

  loadMoreBtn.addEventListener('click', appendItems);

  /* ── Load RSS ── */
  async function init() {
    try {
      const res  = await fetch(RSS_URL);
      const text = await res.text();
      allEpisodes = parseRSS(text);
      filtered    = allEpisodes;

      const urlParams = new URLSearchParams(window.location.search);
      const epSlug    = urlParams.get('ep');

      renderList();

      if (epSlug) {
        const targetIndex = filtered.findIndex(ep => slugify(ep.title) === epSlug);
        if (targetIndex >= 0) openModal(targetIndex);
      }
    } catch (e) {
      listScroll.innerHTML = '<div class="ep-placeholder"><p>Could not load episodes. Please try again later.</p></div>';
      console.error(e);
    }
  }

  init();
})();
</script>
