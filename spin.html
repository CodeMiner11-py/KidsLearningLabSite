<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Spinner</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f7f7f8;
    --surface2: #efefef;
    --border: #d8d8dd;
    --accent: #c0392b;
    --accent2: #e67e22;
    --text: #1a1a1e;
    --muted: #888896;
    --success: #1a7a3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Times New Roman', Times, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  h1 {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #1a1a1e;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    letter-spacing: 0.06em;
    margin-bottom: 40px;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    width: 100%;
    max-width: 960px;
  }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
  }

  .panel-title {
    font-family: 'Times New Roman', Times, serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #1a1a1e;
    border-bottom: 2px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 16px;
  }

  /* --- Step 1: Categories --- */
  .category-input-wrapper {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .category-input-wrapper input[type="text"] {
    flex: 1;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.95rem;
    padding: 9px 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .category-input-wrapper input[type="text"]:focus { border-color: #555; }

  /* Color picker swatch in category row */
  .color-swatch {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    padding: 2px;
    background: #fff;
    flex-shrink: 0;
  }

  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    padding: 0;
    background: none;
  }

  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 4px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

  .btn-add {
    background: #1a1a1e;
    border: none;
    border-radius: 6px;
    color: #ffffff;
    cursor: pointer;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 9px 18px;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover { background: #333; }

  .category-tags {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 10px;
  }

  .tag {
    align-items: center;
    border-radius: 6px;
    display: flex;
    font-size: 0.88rem;
    gap: 8px;
    padding: 6px 10px;
    border: 1px solid;
  }

  .tag .tag-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.12);
  }

  .tag .tag-label { flex: 1; }

  .tag .tag-hex {
    font-size: 0.72rem;
    font-family: 'Courier New', monospace;
    opacity: 0.6;
    letter-spacing: 0.04em;
  }

  .tag button {
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    opacity: 0.5;
    padding: 0;
  }

  .tag button:hover { opacity: 1; }

  /* inline color picker in tag */
  .tag input[type="color"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .hint { color: var(--muted); font-size: 0.78rem; margin-top: 10px; font-style: italic; }

  /* --- Step 2: Participants Table --- */
  .table-wrapper { overflow-x: auto; }

  table { border-collapse: collapse; width: 100%; }

  th {
    color: var(--muted);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0 8px 10px;
    text-align: left;
    text-transform: uppercase;
  }

  td { padding: 4px 3px; }

  td input, td select {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.9rem;
    outline: none;
    padding: 8px 10px;
    transition: border-color 0.2s;
    width: 100%;
  }

  td input:focus, td select:focus { border-color: #555; }
  td select option { background: #ffffff; }

  .btn-row-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 6px;
    transition: color 0.15s;
  }

  .btn-row-del:hover { color: #c0392b; }

  .btn-add-row {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.88rem;
    margin-top: 10px;
    padding: 9px;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-add-row:hover { border-color: #555; color: #333; }

  /* --- Step 3: Generate --- */
  .generate-panel {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .btn-generate {
    background: #1a1a1e;
    border: none;
    border-radius: 8px;
    color: #ffffff;
    cursor: pointer;
    font-family: 'Times New Roman', Times, serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 16px 52px;
    transition: transform 0.15s, background 0.15s;
  }

  .btn-generate:hover { transform: translateY(-2px); background: #333; }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .status-bar {
    color: var(--muted);
    font-size: 0.82rem;
    font-style: italic;
    margin-top: 6px;
  }

  /* Preview list */
  #preview-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 260px;
    width: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .preview-item {
    align-items: center;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    font-size: 0.88rem;
    justify-content: space-between;
    padding: 8px 14px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .preview-item:hover { background: #f0f0f4; }

  .preview-item .pi-name { font-weight: 700; }

  .preview-item .pi-group {
    border-radius: 4px;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 3px 10px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .pi-hex {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    margin-left: 4px;
  }

  /* --- Fullscreen Spin Overlay --- */
  #spinOverlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #ffffff;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  #spinOverlay.open { display: flex; }

  /* Name banner at top */
  #spinName {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    font-style: italic;
    color: #888896;
    letter-spacing: 0.03em;
    margin-bottom: 28px;
    text-align: center;
    padding: 0 20px;
  }

  /* Wheel sits centered */
  #spinCanvasWrap {
    position: relative;
    display: inline-block;
  }

  #spinCanvas {
    border-radius: 50%;
    display: block;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
  }

  #spinCenter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 28px;
    height: 28px;
    background: #ffffff;
    border: 4px solid #1a1a1e;
    border-radius: 50%;
    z-index: 2;
  }

  /* Result reveal — covers everything */
  #resultReveal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    cursor: pointer;
  }

  #resultReveal.show { display: flex; }

  #resultReveal .reveal-bg {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #resultReveal.show .reveal-bg { opacity: 1; }

  #resultReveal .reveal-content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transform: scale(0.7);
    opacity: 0;
    transition: transform 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
  }

  #resultReveal.show .reveal-content {
    transform: scale(1);
    opacity: 1;
    transition-delay: 0.15s;
  }

  .reveal-person {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
  }

  .reveal-label {
    font-family: 'Times New Roman', Times, serif;
    font-size: clamp(3.5rem, 12vw, 8rem);
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 4px 32px rgba(0,0,0,0.25);
  }

  .reveal-hex {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
  }

  .reveal-tap {
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.9rem;
    font-style: italic;
    color: rgba(255,255,255,0.45);
    margin-top: 32px;
    letter-spacing: 0.06em;
  }

  /* Nav row at bottom of spin overlay */
  #spinNav {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 32px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
  }

  .btn-spin-action {
    background: #1a1a1e;
    border: none;
    border-radius: 8px;
    color: #ffffff;
    cursor: pointer;
    font-family: 'Times New Roman', Times, serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 12px 30px;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-spin-action:hover { background: #333; transform: translateY(-1px); }
  .btn-spin-action:active { transform: translateY(0); }
  .btn-spin-action:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-spin-action.ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-spin-action.ghost:hover { border-color: #555; background: var(--surface); }

  /* Name lookup row in generate panel */
  .lookup-row {
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
    max-width: 420px;
  }

  .lookup-row input {
    flex: 1;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.95rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .lookup-row input:focus { border-color: #555; }

  .lookup-suggestions {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    left: 0; right: 0;
    margin-top: 4px;
    overflow: hidden;
    position: absolute;
    top: 100%;
    z-index: 50;
  }

  .lookup-suggestions div {
    cursor: pointer;
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.9rem;
    padding: 9px 14px;
    transition: background 0.1s;
  }

  .lookup-suggestions div:hover { background: var(--surface); }
  .lookup-suggestions div strong { font-weight: 700; }

  .lookup-wrap { position: relative; flex: 1; }
</style>
</head>
<body>

<h1>Wheel of Fate</h1>
<p class="subtitle">CONFIGURE · ASSIGN · SPIN</p>

<div class="layout">

  <!-- Step 1 -->
  <div class="panel">
    <div class="panel-title">① Categories / Groups</div>
    <div class="category-input-wrapper">
      <input type="color" id="catColor" value="#e63946" title="Choose color" style="width:38px;height:38px;border-radius:6px;border:1px solid #d8d8dd;padding:2px;cursor:pointer;flex-shrink:0" />
      <input type="text" id="catInput" placeholder="e.g. Group 1" maxlength="30" />
      <button class="btn-add" onclick="addCategory()">Add</button>
    </div>
    <div class="category-tags" id="catTags"></div>
    <p class="hint">Up to 20 categories. They'll appear as wheel segments.</p>
  </div>

  <!-- Step 2 -->
  <div class="panel">
    <div class="panel-title">② Participants &amp; Assignments</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Lands On</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="participantBody"></tbody>
      </table>
    </div>
    <button class="btn-add-row" onclick="addRow()">+ Add Participant</button>
  </div>

  <!-- Step 3 panel: lookup + preview + launch -->
  <div class="panel generate-panel">
    <div class="panel-title" style="text-align:center">③ Spin for Someone</div>

    <!-- Name lookup -->
    <div class="lookup-row">
      <div class="lookup-wrap">
        <input type="text" id="lookupInput" placeholder="Type a name to spin for…" autocomplete="off"
          oninput="onLookup()" onkeydown="onLookupKey(event)" />
        <div class="lookup-suggestions" id="lookupSuggestions" style="display:none"></div>
      </div>
      <button class="btn-generate" id="lookupSpinBtn" onclick="spinForLookup()" style="padding:10px 24px;font-size:1rem" disabled>
        Spin!
      </button>
    </div>

    <div id="preview-list"></div>
    <button class="btn-generate" id="genBtn" onclick="spinAll()" disabled>
      🎰 Spin All in Order
    </button>
    <p class="status-bar" id="statusBar">Add categories and participants to begin.</p>
  </div>

</div><!-- end .layout -->

<!-- ── Fullscreen Spin Overlay ── -->
<div id="spinOverlay">
  <div id="spinName">–</div>
  <div id="spinCanvasWrap">
    <canvas id="spinCanvas"></canvas>
    <div id="spinCenter"></div>
  </div>
  <div id="spinNav">
    <button class="btn-spin-action ghost" id="btnClose" onclick="closeOverlay()">✕ Close</button>
    <button class="btn-spin-action" id="btnSpin" onclick="spin()">Spin!</button>
    <button class="btn-spin-action ghost" id="btnNext" onclick="spinNext()" style="display:none">Next →</button>
  </div>
</div>

<!-- ── Full-screen Result Reveal ── -->
<div id="resultReveal" onclick="dismissReveal()">
  <div class="reveal-bg" id="revealBg"></div>
  <div class="reveal-content">
    <div class="reveal-person" id="revealPerson"></div>
    <div class="reveal-label" id="revealLabel"></div>
    <div class="reveal-hex" id="revealHex"></div>
    <div class="reveal-tap">tap anywhere to continue</div>
  </div>
</div>

<script>
const PALETTE = [
  '#e63946','#f4a261','#f9c74f','#43aa8b','#4361ee',
  '#7209b7','#ff6b6b','#06d6a0','#118ab2','#fd8c04',
  '#c77dff','#2ec4b6','#e76f51','#457b9d','#a8dadc',
  '#bc6c25','#52b788','#d62828','#023e8a','#b5838d'
];

let categories  = [];
let participants = [];

let spinQueue    = [];
let spinQueueIdx = 0;
let isSpinning   = false;
let spinAF       = null;
let currentAngle = 0;

// ── Canvas sizing ────────────────────────────────────────────────────────────

function wheelSize() {
  const vmin = Math.min(window.innerWidth, window.innerHeight);
  return Math.floor(vmin * 0.60);
}

function resizeCanvas() {
  const canvas = document.getElementById('spinCanvas');
  const s = wheelSize();
  canvas.width  = s;
  canvas.height = s;
  drawWheel(currentAngle);
}

window.addEventListener('resize', resizeCanvas);

// ── Categories ───────────────────────────────────────────────────────────────

document.getElementById('catInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCategory();
});

function addCategory() {
  const input  = document.getElementById('catInput');
  const picker = document.getElementById('catColor');
  const val    = input.value.trim();
  if (!val) return;
  if (categories.length >= 20) return alert('Max 20 categories.');
  if (categories.find(c => c.label.toLowerCase() === val.toLowerCase()))
    return alert('Category already exists.');
  categories.push({ label: val, color: picker.value });
  input.value  = '';
  picker.value = PALETTE[categories.length % PALETTE.length];
  renderCategories(); syncSelects(); updatePreview(); validate();
}

function removeCategory(idx) {
  categories.splice(idx, 1);
  participants.forEach(p => { if (p.targetIndex >= categories.length) p.targetIndex = 0; });
  renderCategories(); syncSelects(); updatePreview(); validate();
}

function renderCategories() {
  document.getElementById('catTags').innerHTML = categories.map((c, i) => `
    <span class="tag" style="background:${c.color}18;color:${c.color};border:1px solid ${c.color}55">
      <span class="tag-swatch" style="background:${c.color}"></span>
      <span class="tag-label">${escH(c.label)}</span>
      <span class="tag-hex">${c.color.toUpperCase()}</span>
      <input type="color" value="${c.color}" title="Pick color"
        oninput="categories[${i}].color=this.value;renderCategories();updatePreview();drawWheel(currentAngle)"
        style="width:18px;height:18px;cursor:pointer;border:none;background:none;padding:0" />
      <button onclick="removeCategory(${i})">×</button>
    </span>`).join('');
}

// ── Participants ─────────────────────────────────────────────────────────────

function addRow() {
  participants.push({ name: '', targetIndex: 0 });
  renderTable(); validate();
}

function removeRow(idx) {
  participants.splice(idx, 1);
  renderTable(); updatePreview(); validate();
}

function renderTable() {
  document.getElementById('participantBody').innerHTML = participants.map((p, i) => `
    <tr>
      <td><input type="text" placeholder="Name" value="${escH(p.name)}"
        oninput="participants[${i}].name=this.value;updatePreview();updateLookupBtn();validate()" /></td>
      <td>
        <select onchange="participants[${i}].targetIndex=+this.value;updatePreview()">
          ${categories.map((c, ci) =>
            `<option value="${ci}" ${p.targetIndex===ci?'selected':''}>${escH(c.label)}</option>`
          ).join('')}
        </select>
      </td>
      <td><button class="btn-row-del" onclick="removeRow(${i})">🗑</button></td>
    </tr>`).join('');
}

function syncSelects() { renderTable(); }

// ── Preview list ─────────────────────────────────────────────────────────────

function updatePreview() {
  const el    = document.getElementById('preview-list');
  const valid = participants.filter(p => p.name.trim() && categories.length > 0);
  if (!valid.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:16px;font-style:italic">No participants yet.</p>';
    return;
  }
  el.innerHTML = valid.map(p => {
    const cat = categories[p.targetIndex] || {};
    const idx = participants.indexOf(p);
    return `
      <div class="preview-item" onclick="spinForIdx(${idx})" title="Spin for ${escH(p.name)}">
        <span class="pi-name">${escH(p.name)}</span>
        <span class="pi-group" style="background:${cat.color};color:#ffffff">
          ${escH(cat.label||'?')}
          <span style="color:rgba(255,255,255,0.65);font-family:'Courier New',monospace;font-size:.7rem;margin-left:4px">${(cat.color||'').toUpperCase()}</span>
        </span>
      </div>`;
  }).join('');
}

// ── Name lookup ──────────────────────────────────────────────────────────────

let lookupTarget = null;

function onLookup() {
  const q   = document.getElementById('lookupInput').value.trim().toLowerCase();
  const box = document.getElementById('lookupSuggestions');
  lookupTarget = null;
  updateLookupBtn();
  if (!q) { box.style.display = 'none'; return; }
  const matches = participants.filter(p => p.name.trim() && p.name.toLowerCase().includes(q));
  if (!matches.length) { box.style.display = 'none'; return; }
  const exact = matches.find(p => p.name.toLowerCase() === q);
  if (exact) { lookupTarget = exact; updateLookupBtn(); }
  box.style.display = 'block';
  box.innerHTML = matches.map(p =>
    `<div onclick="selectLookup(${participants.indexOf(p)})">${escH(p.name)}</div>`
  ).join('');
}

function onLookupKey(e) {
  if (e.key === 'Enter' && lookupTarget) spinForLookup();
}

function selectLookup(idx) {
  lookupTarget = participants[idx];
  document.getElementById('lookupInput').value = lookupTarget.name;
  document.getElementById('lookupSuggestions').style.display = 'none';
  updateLookupBtn();
}

function updateLookupBtn() {
  document.getElementById('lookupSpinBtn').disabled = !lookupTarget;
}

document.addEventListener('click', e => {
  if (!e.target.closest('#lookupInput') && !e.target.closest('#lookupSuggestions'))
    document.getElementById('lookupSuggestions').style.display = 'none';
});

function spinForLookup() {
  if (!lookupTarget) return;
  spinQueue = [lookupTarget]; spinQueueIdx = 0; openOverlay();
}

function spinForIdx(idx) {
  spinQueue = [participants[idx]]; spinQueueIdx = 0; openOverlay();
}

function spinAll() {
  spinQueue = participants.filter(p => p.name.trim());
  spinQueueIdx = 0; openOverlay();
}

// ── Validation ───────────────────────────────────────────────────────────────

function validate() {
  const ok = categories.length >= 2 && participants.some(p => p.name.trim());
  document.getElementById('genBtn').disabled = !ok;
  const bar = document.getElementById('statusBar');
  if (categories.length < 2) bar.textContent = 'Add at least 2 categories.';
  else if (!participants.some(p => p.name.trim())) bar.textContent = 'Add at least 1 named participant.';
  else bar.textContent = `${participants.filter(p=>p.name.trim()).length} participant(s) ready — click a name above to spin, or use Spin All.`;
}

// ── Overlay ───────────────────────────────────────────────────────────────────

function openOverlay() {
  resizeCanvas();
  currentAngle = 0;
  document.getElementById('spinOverlay').classList.add('open');
  loadCurrentSpin();
}

function closeOverlay() {
  if (isSpinning) return;
  cancelAnimationFrame(spinAF);
  document.getElementById('spinOverlay').classList.remove('open');
  document.getElementById('resultReveal').classList.remove('show');
}

function loadCurrentSpin() {
  const p = spinQueue[spinQueueIdx];
  currentAngle = 0;
  document.getElementById('spinName').textContent = p ? p.name : '–';
  document.getElementById('btnSpin').disabled = false;
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('resultReveal').classList.remove('show');
  drawWheel(0);
}

function spinNext() {
  spinQueueIdx++;
  if (spinQueueIdx >= spinQueue.length) { closeOverlay(); return; }
  loadCurrentSpin();
}

// ── Spin animation ────────────────────────────────────────────────────────────

const SPIN_DURATION = 4200;

function spin() {
  if (isSpinning) return;
  const p = spinQueue[spinQueueIdx];
  if (!p) return;

  isSpinning = true;
  document.getElementById('btnSpin').disabled  = true;
  document.getElementById('btnClose').disabled = true;
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('resultReveal').classList.remove('show');

  const n        = categories.length;
  const segAngle = (2 * Math.PI) / n;
  // Tick is at 12 o'clock (−π/2). We want target segment centre there.
  // Segment i centre angle from rotation=0: i*seg + seg/2 (measured from 3 o'clock)
  // We need: rotation + i*seg + seg/2 ≡ −π/2 (mod 2π)
  // => rotation = −π/2 − (i*seg + seg/2) mod 2π
  const landAngle = -Math.PI/2 - (p.targetIndex * segAngle + segAngle/2);
  const finalAngle = currentAngle + 2*Math.PI*5 + ((landAngle - currentAngle) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);

  const startAngle = currentAngle;
  const startTime  = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const t = Math.min((now - startTime) / SPIN_DURATION, 1);
    currentAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) { spinAF = requestAnimationFrame(frame); return; }
    currentAngle = finalAngle;
    drawWheel(currentAngle);
    isSpinning = false;
    document.getElementById('btnClose').disabled = false;
    showReveal(p);
  }

  spinAF = requestAnimationFrame(frame);
}

// ── Reveal ────────────────────────────────────────────────────────────────────

function showReveal(p) {
  const cat = categories[p.targetIndex];
  document.getElementById('revealBg').style.background    = cat.color;
  document.getElementById('revealPerson').textContent     = p.name;
  document.getElementById('revealLabel').textContent      = cat.label;
  document.getElementById('revealHex').textContent        = cat.color.toUpperCase();
  document.getElementById('resultReveal').classList.add('show');
}

function dismissReveal() {
  document.getElementById('resultReveal').classList.remove('show');
  document.getElementById('btnSpin').disabled = false;
  const hasMore = spinQueueIdx < spinQueue.length - 1;
  const nb = document.getElementById('btnNext');
  if (hasMore) {
    nb.style.display = 'inline-block';
    nb.textContent   = `Next: ${spinQueue[spinQueueIdx + 1].name} →`;
  } else {
    nb.style.display = 'none';
  }
}

// ── Draw wheel ────────────────────────────────────────────────────────────────

function drawWheel(rotation) {
  const canvas = document.getElementById('spinCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const r  = cx - 6;
  const n  = categories.length;
  ctx.clearRect(0, 0, W, H);
  if (!n) return;

  const seg = (2 * Math.PI) / n;

  for (let i = 0; i < n; i++) {
    const start = rotation + i * seg;
    const end   = start + seg;
    const cat   = categories[i];

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = cat.color;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    const mid = start + seg/2;
    const lx  = cx + r * 0.63 * Math.cos(mid);
    const ly  = cy + r * 0.63 * Math.sin(mid);
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(mid + Math.PI/2);
    const label    = cat.label.length > 13 ? cat.label.slice(0, 12) + '\u2026' : cat.label;
    const fontSize = Math.max(10, Math.min(16, Math.floor(r * seg * 0.38)));
    ctx.font         = `bold ${fontSize}px 'Times New Roman', Times, serif`;
    ctx.fillStyle    = '#ffffff';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur   = 4;
    ctx.fillText(label, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2*Math.PI);
  ctx.strokeStyle = '#dddddd';
  ctx.lineWidth   = 4;
  ctx.stroke();

  // Top tick at 12 o'clock (no arrow)
  const tAngle = -Math.PI/2;
  ctx.beginPath();
  ctx.moveTo(cx + (r + 2)*Math.cos(tAngle), cy + (r + 2)*Math.sin(tAngle));
  ctx.lineTo(cx + (r - 24)*Math.cos(tAngle), cy + (r - 24)*Math.sin(tAngle));
  ctx.strokeStyle = '#1a1a1e';
  ctx.lineWidth   = 7;
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Centre dot
  ctx.beginPath();
  ctx.arc(cx, cy, 11, 0, 2*Math.PI);
  ctx.fillStyle   = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = '#1a1a1e';
  ctx.lineWidth   = 3;
  ctx.stroke();
}

// ── Util ──────────────────────────────────────────────────────────────────────

function escH(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
addRow();
validate();
</script>
