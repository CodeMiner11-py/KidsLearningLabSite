<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download PDF</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf6f0;
      font-family: 'Jost', sans-serif;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      background: #fff;
      border: 1px solid #e8ddd5;
      border-radius: 4px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.05);
    }

    h1 {
      font-family: 'EB Garamond', serif;
      font-weight: 300;
      font-size: 2.4rem;
      color: #2a1f1a;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }

    a.btn {
      display: inline-block;
      text-decoration: none;
      padding: 0.75rem 2rem;
      background: #2a1f1a;
      color: #fdf6f0;
      font-family: 'EB Garamond', serif;
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: 0.08em;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
    }

    a.btn:hover {
      background: #5c3d2e;
      transform: translateY(-1px);
    }

    a.btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Download PDF</h1>
    <a class="btn" href="mothers.pdf" download="mothers.pdf">Click here to download Mothers' Day PDF.</a>
  </div>
</body>
</html>
